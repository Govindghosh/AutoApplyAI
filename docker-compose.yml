services:

  # ==========================================
  # POSTGRES DATABASE
  # ==========================================
  db:
    image: postgres:17

    container_name: autoapplyai_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoapplyai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - autoapplyai_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # REDIS
  # ==========================================
  redis:
    image: redis:7

    container_name: autoapplyai_redis

    restart: always

    ports:
      - "6379:6379"

    networks:
      - autoapplyai_network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # PGADMIN
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4

    container_name: autoapplyai_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autoapplyai.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - db

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - autoapplyai_network

  # ==========================================
  # N8N WORKFLOW AUTOMATION
  # ==========================================
  n8n:
    image: n8nio/n8n:latest

    container_name: autoapplyai_n8n

    restart: always

    ports:
      - "5678:5678"

    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: Asia/Kolkata
      TZ: Asia/Kolkata
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-autoapplyai-local-dev-encryption-key-change-me}
      N8N_RUNNERS_ENABLED: true

    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n:/files

    networks:
      - autoapplyai_network

  # ==========================================
  # FASTAPI BACKEND
  # ==========================================
  backend:
    build:
      context: ./backend

    container_name: autoapplyai_backend

    restart: always

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - ./storage:/app/storage

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

      n8n:
        condition: service_started

    shm_size: '2gb'

    networks:
      - autoapplyai_network

  # ==========================================
  # CELERY WORKER
  # ==========================================
  celery_worker:
    build:
      context: ./backend

    container_name: autoapplyai_celery_worker

    restart: always

    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - ./storage:/app/storage

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

      n8n:
        condition: service_started

    shm_size: '2gb'

    networks:
      - autoapplyai_network

  # ==========================================
  # FLOWER DASHBOARD
  # ==========================================
  flower:
    build:
      context: ./backend

    container_name: autoapplyai_flower

    restart: always

    command: >
      celery -A app.workers.celery_app flower

    ports:
      - "5555:5555"

    env_file:
      - ./backend/.env

    depends_on:
      - redis
      - celery_worker

    networks:
      - autoapplyai_network

volumes:
  postgres_data:
  pgadmin_data:
  n8n_data:

networks:
  autoapplyai_network:
    driver: bridge
