services:

  # ==========================================
  # POSTGRES DATABASE
  # ==========================================
  db:
    image: postgres:17

    container_name: autoapplyai_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoapplyai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # REDIS
  # ==========================================
  redis:
    image: redis:7

    container_name: autoapplyai_redis

    restart: always

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # PGADMIN
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4

    container_name: autoapplyai_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autoapplyai.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - db

    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ==========================================
  # FASTAPI BACKEND
  # ==========================================
  backend:
    build:
      context: ./backend

    container_name: autoapplyai_backend

    restart: always

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    shm_size: '2gb'

  # ==========================================
  # CELERY WORKER
  # ==========================================
  celery_worker:
    build:
      context: ./backend

    container_name: autoapplyai_celery_worker

    restart: always

    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    shm_size: '2gb'

  # ==========================================
  # FLOWER DASHBOARD
  # ==========================================
  flower:
    build:
      context: ./backend

    container_name: autoapplyai_flower

    restart: always

    command: >
      celery -A app.workers.celery_app flower

    ports:
      - "5555:5555"

    env_file:
      - ./backend/.env

    depends_on:
      - redis
      - celery_worker

volumes:
  postgres_data:
  pgadmin_data: